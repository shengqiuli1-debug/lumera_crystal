version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lumera-postgres
    environment:
      POSTGRES_DB: lumera
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: lumera-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/lumera
      APP_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: lumera-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
